name: Deploy Playground

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      schema_ref:
        description: Branch, tag, or commit from M-casado/fega-metadata-schema
        required: true
        default: main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout playground
        uses: actions/checkout@v5

      - name: Checkout schema source
        uses: actions/checkout@v5
        with:
          repository: M-casado/fega-metadata-schema
          ref: ${{ github.event.inputs.schema_ref || 'main' }}
          path: .cache/fega-metadata-schema

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate static assets
        run: npm run generate -- --schema-root .cache/fega-metadata-schema --schema-ref "${{ github.event.inputs.schema_ref || 'main' }}"

      - name: Test
        run: npm test

      - name: Build
        env:
          FEGA_SCHEMA_ROOT: .cache/fega-metadata-schema
          FEGA_SCHEMA_REF: ${{ github.event.inputs.schema_ref || 'main' }}
          VITE_BASE_PATH: /fega-metadata-playground/
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
